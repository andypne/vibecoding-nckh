name: Horizon Daily Crawl & Push

on:
  schedule:
    - cron: '0 9 * * *'  # 9:00 AM UTC every day
  workflow_dispatch:    # Allow manual trigger

jobs:
  crawl-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: Horizon
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: Horizon
        run: uv sync

      - name: Run Horizon crawl
        working-directory: Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run horizon

      - name: Push to Supabase
        working-directory: Horizon
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run python push_to_supabase.py

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Horizon/data/summaries -A || true
          git commit -m "🤖 Horizon daily crawl: $(date -u +'%Y-%m-%d')" || true
          git push || true
